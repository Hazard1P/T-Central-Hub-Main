name: Dyson Continuity Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  continuity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dyson continuity gate
        run: npm run check:dyson-continuity

      - name: Generate release notes
        run: npm run release:notes
